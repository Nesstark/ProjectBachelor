behaviors:
  AIPlayerAgent:
    trainer_type: ppo
    hyperparameters:
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      batch_size: 512
      buffer_size: 20480
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      memory:
        memory_size: 128
        sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.02
        encoding_size: 64
        learning_rate: 3.0e-4
    keep_checkpoints: 5
    checkpoint_interval: 50000
    max_steps: 5000000
    time_horizon: 128
    summary_freq: 10000