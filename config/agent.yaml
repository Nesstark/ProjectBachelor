# ============================================================
#  agent.yaml  —  ML-Agents PPO Training Config
#
#  Save this file at:  <ProjectRoot>/config/agent.yaml
#
#  Run training with:
#    mlagents-learn config/agent.yaml --run-id=run1
#
#  Resume a run:
#    mlagents-learn config/agent.yaml --run-id=run1 --resume
#
#  Watch live in TensorBoard:
#    tensorboard --logdir results
# ============================================================

behaviors:
  AIPlayerAgent:
    trainer_type: ppo          # PPO = Proximal Policy Optimisation
                               # The same core algorithm behind ChatGPT's RLHF

    hyperparameters:
      # ── Learning rate ────────────────────────────────────
      # How big a step to take when updating the network.
      # Too high = unstable. Too low = slow learning.
      learning_rate: 3.0e-4
      learning_rate_schedule: linear   # decays to 0 over training

      # ── Batch / Buffer sizes ─────────────────────────────
      # batch_size: samples processed per gradient update
      # buffer_size: experience collected before each update
      batch_size: 512
      buffer_size: 20480

      # ── PPO clip ─────────────────────────────────────────
      # Limits how much the policy can change per update.
      # This is the "proximal" part — prevents catastrophic forgetting.
      beta: 5.0e-3              # entropy bonus — encourages exploration
      epsilon: 0.2              # clip range
      lambd: 0.95               # GAE lambda (credit assignment over time)
      num_epoch: 3

    network_settings:
      # The agent's "brain" — a small MLP
      normalize: true           # normalise observations → faster convergence
      hidden_units: 256         # neurons per layer
      num_layers: 2             # depth

    reward_signals:
      extrinsic:
        # Extrinsic = your hand-crafted carrot & stick rewards
        gamma: 0.99             # discount factor — how much future rewards matter
        strength: 1.0           # scale multiplier

      curiosity:
        # Intrinsic Curiosity Module (ICM):
        # The agent gets a BONUS reward for seeing things it hasn't seen before.
        # This drives exploration WITHOUT you having to hand-code every area.
        # It naturally wants to find the exit because it hasn't been there yet.
        gamma: 0.99
        strength: 0.02          # keep low so it doesn't override extrinsic reward
        encoding_size: 64
        learning_rate: 3.0e-4

    keep_checkpoints: 5         # save last 5 model snapshots
    checkpoint_interval: 50000  # save every 50k steps
    max_steps: 2000000          # total training steps (increase for complex levels)
    time_horizon: 128           # steps per rollout segment
    summary_freq: 10000         # log to TensorBoard every 10k steps
